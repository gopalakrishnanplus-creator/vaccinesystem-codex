{% extends "vaccinations/base.html" %}
{% block title %}Update Patient — Doctor{% endblock %}
{% block content %}
<div class="page-intro">
  <span class="page-eyebrow">Doctor portal</span>
  <h1>Update a patient record</h1>
  <p class="page-subtitle">Search by the parent’s WhatsApp number to find patients inside your clinic only.</p>
</div>

<div class="panel form-shell">
  <form method="post">
    {% csrf_token %}
    <div class="field">
      <label>Parent's WhatsApp No.</label>
      {{ form.parent_whatsapp }}
    </div>
    <button class="btn">Continue</button>
  </form>
</div>
{% endblock %}
